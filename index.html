<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Maker | Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-400 mb-6">Quiz Maker</h1>
        
        <div class="card p-6 rounded-xl mb-6">
            <input type="text" id="title" placeholder="Quiz Title" class="w-full p-3 mb-4 bg-slate-900 rounded border border-slate-700">
            <div id="q-list"></div>
            <button onclick="addQ()" class="w-full py-2 border border-dashed border-slate-600 rounded-lg mt-4">+ Add Question</button>
        </div>

        <button onclick="exportQuiz()" class="w-full bg-blue-600 py-4 rounded-xl font-bold shadow-lg">Generate & Download HTML</button>
    </div>

    <script>
        function addQ() {
            const div = document.createElement('div');
            div.className = "q-block bg-slate-800 p-4 rounded-lg mt-4 border-l-4 border-blue-500";
            div.innerHTML = `
                <input type="text" placeholder="Question" class="q-val w-full p-2 mb-2 bg-slate-900 rounded border border-slate-700">
                <input type="text" placeholder="Correct Answer" class="a-correct w-full p-2 mb-2 bg-green-900/20 border border-green-800 rounded">
                <input type="text" placeholder="Wrong Answer 1" class="a-wrong w-full p-2 mb-2 bg-slate-900 rounded border border-slate-700">
                <input type="text" placeholder="Wrong Answer 2" class="a-wrong w-full p-2 mb-2 bg-slate-900 rounded border border-slate-700">
            `;
            document.getElementById('q-list').appendChild(div);
        }

        function exportQuiz() {
            const title = document.getElementById('title').value || "My Quiz";
            const blocks = document.querySelectorAll('.q-block');
            const questions = Array.from(blocks).map(b => ({
                q: b.querySelector('.q-val').value,
                c: b.querySelector('.a-correct').value,
                w: Array.from(b.querySelectorAll('.a-wrong')).map(i => i.value)
            }));

            const template = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>\${title}</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-slate-900 text-white p-10 flex flex-col items-center">
    <div class="max-w-xl w-full bg-slate-800 p-8 rounded-2xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-blue-400">\${title}</h1>
        <div id="box">
            <p id="qt" class="text-xl mb-4"></p>
            <div id="opts" class="grid gap-3"></div>
        </div>
    </div>
    <script>
        const qs = \${JSON.stringify(questions)};
        let cur = 0, score = 0;
        function load() {
            if(cur >= qs.length) { document.getElementById('box').innerHTML = '<h2 class="text-2xl">Done! Score: '+score+'/'+qs.length+'</h2>'; return; }
            const q = qs[cur];
            document.getElementById('qt').innerText = q.q;
            const buttons = [q.c, ...q.w].sort(() => Math.random() - 0.5);
            const container = document.getElementById('opts');
            container.innerHTML = '';
            buttons.forEach(txt => {
                const b = document.createElement('button');
                b.className = "p-3 bg-slate-700 rounded-lg hover:bg-slate-600 border border-slate-600";
                b.innerText = txt;
                b.onclick = () => {
                    if(txt === q.c) score++;
                    cur++;
                    load();
                };
                container.appendChild(b);
            });
        }
        load();
    <\/script>
</body>
</html>`;

            const blob = new Blob([template.replace(/\${title}/g, title).replace(/\${JSON.stringify\(questions\)}/g, JSON.stringify(questions))], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "quiz.html";
            a.click();
        }

        addQ();
    </script>
</body>
</html>
