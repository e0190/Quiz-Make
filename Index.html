<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Architect | Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-blue-400 mb-2">Quiz Architect</h1>
            <p class="text-slate-400">Design your quiz and export it as a standalone web app.</p>
        </header>

        <div class="card p-6 rounded-xl mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Quiz Title</label>
                    <input type="text" id="quizTitle" placeholder="e.g., Ultimate Sci-Fi Trivia" class="w-full p-2 rounded bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Accent Color</label>
                    <input type="color" id="quizColor" value="#3b82f6" class="w-full h-10 rounded bg-slate-900 border border-slate-700 cursor-pointer">
                </div>
            </div>

            <div id="questionsContainer">
                </div>

            <button onclick="addQuestion()" class="mt-4 w-full py-3 border-2 border-dashed border-slate-700 rounded-xl hover:border-blue-500 hover:text-blue-500 transition-all font-medium">
                + Add Question
            </button>
        </div>

        <div class="flex flex-col md:flex-row gap-4">
            <button onclick="generateQuiz('download')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg transition-all">
                Download .HTML File
            </button>
            <button onclick="generateQuiz('copy')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-4 rounded-xl font-bold shadow-lg transition-all">
                Copy Source Code
            </button>
        </div>
    </div>

    <script>
        let questionCount = 0;

        function addQuestion() {
            questionCount++;
            const div = document.createElement('div');
            div.className = "question-block card p-4 rounded-lg mb-4 relative border-l-4 border-blue-500";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-slate-500 hover:text-red-500">✕</button>
                <input type="text" placeholder="Question ${questionCount}" class="q-text w-full p-2 mb-3 bg-slate-800 rounded border border-slate-700 font-bold">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                    <input type="text" placeholder="Option 1 (Correct)" class="q-opt-correct w-full p-2 bg-green-900/20 border border-green-900/50 rounded">
                    <input type="text" placeholder="Option 2" class="q-opt w-full p-2 bg-slate-800 border border-slate-700 rounded">
                    <input type="text" placeholder="Option 3" class="q-opt w-full p-2 bg-slate-800 border border-slate-700 rounded">
                    <input type="text" placeholder="Option 4" class="q-opt w-full p-2 bg-slate-800 border border-slate-700 rounded">
                </div>
            `;
            document.getElementById('questionsContainer').appendChild(div);
        }

        function generateQuiz(mode) {
            const title = document.getElementById('quizTitle').value || "My Awesome Quiz";
            const color = document.getElementById('quizColor').value;
            const blocks = document.querySelectorAll('.question-block');
            
            const quizData = Array.from(blocks).map(b => ({
                q: b.querySelector('.q-text').value,
                correct: b.querySelector('.q-opt-correct').value,
                others: Array.from(b.querySelectorAll('.q-opt')).map(i => i.value).filter(v => v !== "")
            }));

            const finalHTML = `
<!DOCTYPE html>
<html>
<head>
    <title>\${title}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .option-btn:hover { border-color: \${color}; color: \${color}; }
        .correct { background: #166534 !important; border-color: #22c55e !important; }
        .wrong { background: #991b1b !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen justify-center">
    <div id="game" class="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-6 text-center" style="color: \${color}">\${title}</h1>
        <div id="quiz-content">
            <p id="q-text" class="text-xl mb-6"></p>
            <div id="options" class="space-y-3"></div>
        </div>
        <div id="result" class="hidden text-center">
            <h2 class="text-4xl font-bold mb-4">Quiz Complete!</h2>
            <p id="score" class="text-2xl mb-6"></p>
            <button onclick="location.reload()" class="px-6 py-2 rounded-lg font-bold" style="background: \${color}">Restart</button>
        </div>
    </div>

    <script>
        const data = \${JSON.stringify(quizData)};
        let currentIdx = 0;
        let score = 0;

        function loadQ() {
            if(currentIdx >= data.length) return showResult();
            const item = data[currentIdx];
            document.getElementById('q-text').innerText = item.q;
            const opts = [...item.others, item.correct].sort(() => Math.random() - 0.5);
            const container = document.getElementById('options');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn w-full p-4 text-left border border-slate-600 rounded-xl transition-all";
                b.innerText = o;
                b.onclick = () => check(o, b, item.correct);
                container.appendChild(b);
            });
        }

        function check(val, btn, correct) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
            if(val === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }
            setTimeout(() => { currentIdx++; loadQ(); }, 1500);
        }

        function showResult() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('score').innerText = \`You scored \${score} out of \${data.length}\`;
        }

        loadQ();
    <\/script>
</body>
</html>`.replace(/\${title}/g, title).replace(/\${color}/g, color).replace(/\${JSON.stringify\(quizData\)}/g, JSON.stringify(quizData));

            if (mode === 'download') {
                const blob = new Blob([finalHTML], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `quiz.html`;
                a.click();
            } else {
                navigator.clipboard.writeText(finalHTML);
                alert("Code copied to clipboard!");
            }
        }

        // Add one question by default
        addQuestion();
    </script>
</body>
</html>
